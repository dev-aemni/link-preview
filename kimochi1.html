<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiMoTi 💌</title>

    <!-- Open Graph -->
    <meta property="og:title" content="Tumhara Dhaniya 💌">
    <meta property="og:description" content="Kaisi ho meri rani? kimochhi!! ✨">
    <meta property="og:image" content="https://kimochi1-lp.netlify.app/preview.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://kimochi1-lp.netlify.app">
    <meta property="og:type" content="website">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">

    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }

        h1 {
            font-size: 2.2rem;
            animation: pulse 2s infinite ease-in-out;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        @keyframes pulse {
            0%,100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: float 8s linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
            }
            to {
                transform: translateY(-10vh);
            }
        }
    </style>
</head>
<body>

    <h1>💌 KiMoTi</h1>

    <script>
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (4 + Math.random() * 6) + 's';
            p.style.opacity = Math.random();
            document.body.appendChild(p);
        }
    </script>

</body>
</html>

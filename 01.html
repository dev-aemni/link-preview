<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Link Preview</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0d1117;
        color: white;
        display: flex;
        justify-content: center;
        padding: 40px;
    }

    .container {
        width: 500px;
    }

    input {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        margin-bottom: 15px;
        font-size: 16px;
        background: #161b22;
        color: white;
    }

    button {
        padding: 12px 20px;
        background: #238636;
        border: none;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        font-size: 16px;
    }

    .preview {
        margin-top: 20px;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 20px;
        background: #161b22;
        display: none;
    }

    .preview img {
        width: 100%;
        border-radius: 8px;
        margin-bottom: 15px;
    }

    .repo-name {
        font-size: 22px;
        font-weight: bold;
    }

    .repo-desc {
        color: #8b949e;
        margin: 10px 0;
    }

    a {
        color: #58a6ff;
        text-decoration: none;
    }
</style>
</head>
<body>

<div class="container">
    <h2>GitHub Link Preview</h2>

    <input id="repoUrl" placeholder="Paste GitHub repo URL">
    <button onclick="generatePreview()">Preview</button>

    <div class="preview" id="previewBox">
        <img id="repoImage" src="" alt="Preview">
        <div class="repo-name" id="repoName"></div>
        <div class="repo-desc" id="repoDesc"></div>
        <a id="repoLink" target="_blank">Open Repository</a>
    </div>
</div>

<script>
async function generatePreview() {
    const url = document.getElementById("repoUrl").value.trim();

    const match = url.match(/github\\.com\\/([^/]+)\\/([^/]+)/);
    if (!match) {
        alert("Invalid GitHub repo URL");
        return;
    }

    const owner = match[1];
    const repo = match[2];

    try {
        const response = await fetch(`https://api.github.com/repos/${owner}/${repo}`);
        const data = await response.json();

        document.getElementById("repoName").textContent = data.full_name;
        document.getElementById("repoDesc").textContent =
            data.description || "No description";

        document.getElementById("repoLink").href = data.html_url;
        document.getElementById("repoLink").textContent = data.html_url;

        document.getElementById("repoImage").src =
            `https://opengraph.githubassets.com/1/${owner}/${repo}`;

        document.getElementById("previewBox").style.display = "block";

    } catch (err) {
        alert("Failed to fetch repo data");
    }
}
</script>

</body>
</html>
